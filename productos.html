<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productos | Dr. Mixing</title>
  <link rel="stylesheet" href="./styles.css">
</head>

<body class="productos-body">

  <!-- NAVBAR (misma marca, pero con botón volver) -->
  <header class="navbar productos-nav">
    <div class="nav-left">
      <a href="index.html">← VOLVER</a>
    </div>

    <div class="logo">
      <img src="./img/Mixing-logo.png" alt="Dr Mixing">
    </div>

    <div class="nav-right">
      <a
        class="nav-cta"
        href="https://wa.me/51917308281"
        target="_blank"
        rel="noopener"
      >
        NOSOTROS
      </a>
    </div>
  </header>

  <!-- HERO PRODUCTOS -->
  <section class="productos-hero">
    <h1>CATÁLOGO</h1>
    <p>Jarabes y licores para coctelería</p>
  </section>

  <!-- JARABES -->
  <section class="categoria">
    <h2>JARABES</h2>

    <div class="grid-productos">
      <div class="producto-card">
        <img src="./img/Granadina.png" alt="Granadina">
        <p>Granadina</p>
      </div>

      <div class="producto-card">
        <img src="./img/Blue.png" alt="Blue Curaçao">
        <p>Blue Curaçao</p>
      </div>

      <div class="producto-card">
        <img src="./img/Menta.png" alt="Menta">
        <p>Menta</p>
      </div>
    </div>
  </section>

  <!-- LICORES -->
  <section class="categoria">
    <h2>LICORES</h2>

    <div class="grid-productos">
      <div class="producto-card">
        <img src="./img/Licor-apple-sour.png" alt="Apple Sour">
        <p>Apple Sour</p>
      </div>

      <div class="producto-card">
        <img src="./img/Licor-blue.png" alt="Licor Blue">
        <p>Licor Blue</p>
      </div>

      <div class="producto-card">
        <img src="./img/Licor-menta.png" alt="Licor de Menta">
        <p>Licor de Menta</p>
      </div>
    </div>
  </section>
